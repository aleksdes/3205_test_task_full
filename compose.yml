services:
  app:
    build:
      context: .
      args:
        VITE_API_TARGET: ${VITE_API_TARGET:-http://localhost:8000}
    container_name: url-task
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - BACKEND_HOST=0.0.0.0
    volumes:
      - job-data:/app/apps/backend/data
    restart: unless-stopped

volumes:
  job-data:
